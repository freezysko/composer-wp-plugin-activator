name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.163.0
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Scan
        run: |
          # --config auto resolves rule packs against Semgrep's registry based
          # on detected languages and is the recommended OSS default. Earlier
          # iteration of this workflow passed explicit `--config p/X` packs
          # (php-security-audit / github-actions / owasp-top-ten / php) but the
          # container exits with code 7 / loads 0 rules — `--config auto` is
          # the path Semgrep's own docs route to in their CE workflow example.
          semgrep scan \
            --config auto \
            --error \
            --sarif --output semgrep.sarif \
            src/ tests/ .github/workflows/

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
