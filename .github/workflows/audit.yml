name: composer audit

on:
  schedule:
    - cron: "30 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # was v2.37.1 — current as of 2026-05-19
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # was 4.0.0 — current as of 2026-05-19

      - name: Run composer audit
        run: composer audit --no-interaction --format=plain
