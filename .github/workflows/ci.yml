name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.php }}, ${{ matrix.composer }}, ${{ matrix.dependency-versions }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        composer: ["2.2", "latest"]
        dependency-versions: ["highest", "lowest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # was v2.37.1 — current as of 2026-05-19
        with:
          php-version: ${{ matrix.php }}
          tools: ${{ matrix.composer == 'latest' && 'composer' || format('composer:v{0}', matrix.composer) }}
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # was 4.0.0 — current as of 2026-05-19
        with:
          dependency-versions: ${{ matrix.dependency-versions }}

      - name: Run CI
        run: composer ci
